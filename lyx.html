<!DOCTYPE html>

<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To 李宇轩 - 520表白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            touch-action: manipulation;
        }

        /* 加载提示 */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            z-index: 999;
            font-size: 1.5em;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 代码雨样式 */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.5;
        }

        /* 爱心树容器 */
        .love-tree {
            position: fixed;
            bottom: 0;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* 表白文字样式 */
        .love-text {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            font-size: min(4.5em, 8vw);
            text-align: center;
            z-index: 3;
            text-shadow: 0 0 15px #ff69b4;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out infinite;
            -webkit-text-stroke: 1px #ff1493;
            paint-order: stroke fill;
        }

        .signature {
            position: fixed;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            font-size: min(2.8em, 5vw);
            text-align: center;
            z-index: 3;
            text-shadow: 0 0 12px #ff69b4;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out infinite;
            animation-delay: 1s;
        }

        .apology {
            position: fixed;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            font-size: min(2em, 4vw);
            text-align: center;
            z-index: 3;
            text-shadow: 0 0 12px #ff69b4;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out infinite;
            animation-delay: 2s;
            line-height: 1.8;
        }

        /* 跑马灯文字 */
        .marquee {
            position: fixed;
            bottom: 20px;
            width: 100%;
            color: #ff69b4;
            font-size: min(2em, 3vw);
            text-align: center;
            z-index: 3;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 爱心雨样式 */
        .heart {
            position: fixed;
            font-size: 20px;
            color: #ff69b4;
            z-index: 2;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        /* 粒子效果 */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            border-radius: 50%;
            animation: particleFade 1s ease-out forwards;
        }

        @keyframes particleFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .love-text { top: 30%; }
            .signature { top: 60%; }
            .apology { top: 72%; }
            .marquee { bottom: 10px; }
        }

        @media (max-width: 480px) {
            .love-text { top: 25%; }
            .signature { top: 55%; }
            .apology { top: 70%; }
        }
    </style>
</head>
<body>

<canvas id="matrix" width="1609" height="833"></canvas>
<canvas id="love-tree-left" class="love-tree" width="1609" height="833"></canvas>
<canvas id="love-tree-right" class="love-tree" width="1609" height="833"></canvas>
<div class="love-text">
    李宇轩<br>
    我爱你 ❤<br>
    520快乐
</div>
<div class="signature">
    ——李宇轩
</div>
<div class="apology">
    <br>
    对不起，我做错了很多<br>
    我会用一生的时间来补偿你<br>
    永远爱你 ❤
</div>
<div class="marquee">
    李宇轩，遇见你是我最大的幸福，我永远爱你！愿意用余生的每一天来陪伴你、守护你、爱护你！
</div>

<script>
    // 初始化加载状态
    const loader = document.querySelector('.loader');
    window.addEventListener('load', () => {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 300);
    });

    // 代码雨效果（优化版）
    const matrix = document.getElementById('matrix');
    const ctx = matrix.getContext('2d');
    matrix.width = window.innerWidth;
    matrix.height = window.innerHeight;

    const chars = "0123456789ABCDEF我爱你李宇轩❤";
    const fontSize = 16;
    const columns = matrix.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    let lastRender = 0;

    function drawMatrix(timestamp) {
        if (timestamp - lastRender > 50) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, matrix.width, matrix.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if(drops[i] * fontSize > matrix.height && Math.random() > 0.975)
                    drops[i] = 0;

                drops[i]++;
            }
            lastRender = timestamp;
        }
        requestAnimationFrame(drawMatrix);
    }

    // 爱心树系统
    const trees = {
        left: { canvas: document.getElementById('love-tree-left'), ctx: null },
        right: { canvas: document.getElementById('love-tree-right'), ctx: null }
    };

    function initTrees() {
        Object.values(trees).forEach(tree => {
            tree.canvas.width = window.innerWidth;
            tree.canvas.height = window.innerHeight;
            tree.ctx = tree.canvas.getContext('2d');
        });
    }

    // 动态树参数
    function getTreeParams() {
        const width = window.innerWidth;
        return {
            length: width * 0.06, // 树枝长度为屏幕宽度的
            depth: 6, // 更茂密的树
            leftPos: 0.2, // 左侧树更靠近边缘
            rightPos: 0.8 // 右侧树更靠近边缘
        };
    }

    function drawTree(ctx, x, y, length, angle, depth) {
        if (depth === 0) {
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ff69b4';
            ctx.fill();
            return;
        }

        const endX = x + length * Math.cos(angle);
        const endY = y - length * Math.sin(angle);

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = `hsl(330, 100%, ${70 - depth*2}%)`;
        ctx.lineWidth = depth;
        ctx.stroke();

        drawTree(ctx, endX, endY, length * 0.8, angle + 0.3, depth - 1);
        drawTree(ctx, endX, endY, length * 0.8, angle - 0.3, depth - 1);
    }

    // 粒子系统
    const particles = {
        list: [],
        maxCount: 50,
        create(x, y, color) {
            if (this.list.length >= this.maxCount) return;

            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.cssText = `
                    left: ${x}px;
                    top: ${y}px;
                    width: ${Math.random() * 8 + 4}px;
                    height: ${Math.random() * 8 + 4}px;
                    background-color: ${color};
                `;
            document.body.appendChild(particle);
            this.list.push(particle);

            setTimeout(() => {
                particle.remove();
                this.list = this.list.filter(p => p !== particle);
            }, 1000);
        }
    };

    // 互动系统
    document.addEventListener('mousemove', (e) => {
        if (Math.random() > 0.9) {
            particles.create(e.clientX, e.clientY, '#ff69b4');
        }
    });

    document.addEventListener('click', (e) => {
        for (let i = 0; i < 20; i++) {
            particles.create(e.clientX, e.clientY, '#ff69b4');
        }
    });

    // 触摸支持
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        if (Math.random() > 0.9) {
            particles.create(touch.clientX, touch.clientY, '#ff69b4');
        }
    });

    // 爱心雨系统
    const hearts = {
        maxCount: 30,
        list: [],
        create() {
            if (this.list.length >= this.maxCount) return;

            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.cssText = `
                    left: ${Math.random() * 100}vw;
                    animation-duration: ${Math.random() * 3 + 2}s;
                    font-size: ${Math.random() * 15 + 15}px;
                    color: hsl(${Math.random() * 60 + 330}, 100%, 65%);
                `;
            heart.innerHTML = '❤';
            document.body.appendChild(heart);
            this.list.push(heart);

            setTimeout(() => {
                heart.remove();
                this.list = this.list.filter(h => h !== heart);
            }, 5000);
        }
    };

    // 窗口适配
    function handleResize() {
        matrix.width = window.innerWidth;
        matrix.height = window.innerHeight;
        initTrees();

        const params = getTreeParams();
        drawTree(trees.left.ctx, trees.left.canvas.width * params.leftPos,
            trees.left.canvas.height, params.length, Math.PI/2, params.depth);
        drawTree(trees.right.ctx, trees.right.canvas.width * params.rightPos,
            trees.right.canvas.height, params.length, Math.PI/2, params.depth);
    }

    // 初始化
    function init() {
        initTrees();
        handleResize();
        drawMatrix();
        setInterval(() => hearts.create(), 200);
        window.addEventListener('resize', handleResize);
    }

    init();
</script>
